site_name: Le blog des bikininjas
site_url: https://bikininjas.github.io/
site_author: Sebastien PICOT
repo_url: https://github.com/bikininjas/bikininjas.github.io
repo_name: bikininjas/bikininjas.github.io
site_description: >-
  Décryptage des tendances sociétales, gaming, tft, tech, IA
theme:
  name: material
  language: fr
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - header.autohide
    - navigation.footer
plugins:
  - search
  - awesome-pages
  - projects:
      projects_dir: examples
      projects_config_transform: !!python/name:examples.transform
      log_level: info  
  - blog:
      blog_dir: .
    authors_profiles: true

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn    
extra:
  generator: false
  social:
    - icon: fontawesome/brands/mastodon 
      link: https://fosstodon.org/@squidfunk
  analytics:
    provider: google
    property: G-XXXXXXXXXX
    feedback:
      title: Ca t'a aidé ?
      ratings:
        - icon: material/emoticon-happy-outline
          name: Grave !
          data: 1
          note: >-
            Merci de ton retour !
        - icon: material/emoticon-sad-outline
          name: Bof, c'est pas grave
          data: 0
          note: >- 
            Merci de ton retour !
markdown_extensions:
  - abbr
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
  - tables
  - pymdownx.superfences
copyright: Copyright &copy; 2024 Bikininja