site_name: Le blog des bikininjas
site_url: https://bikininjas.github.io/
theme:
  name: dracula
plugins:
  - search
  - awesome-pages
  - blogging:
      dirs: # The directories to be included
        - docs
      features:
        tags:
          index_page: tags.md
          insert: top
      categories:
        - name: tft
          dirs:
            - tft
        - name: societe
          dirs:
            - societe
        - name: tech
          dirs:
            - tech
        - name: gaming
          dirs:
            - gaming




  - blogging:
      # GLOBAL CATEGORY: configs for {{ blog_content }}
      dirs:
        - blog


      # INDIVIDUAL CATEGORIES: configs for {{ blog_content name }}
      categories:
        - name: reviews
          dirs:
            - reviews

      features:
        tags:
          

